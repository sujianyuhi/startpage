<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="青柠起始页 - 极致简洁、高效无感的浏览器起始页">
    <meta name="theme-color" content="#42b883">
    <title>青柠起始页</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 壁纸背景 -->
    <div class="wallpaper-container">
        <img class="wallpaper" id="wallpaper" src="" alt="">
        <div class="wallpaper-overlay" id="wallpaperOverlay"></div>
    </div>

    <!-- 天气模块 -->
    <div class="weather-module hide-in-immersive" id="weatherModule">
        <div class="weather-icon" id="weatherIcon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </div>
        <div class="weather-info">
            <span class="weather-temp" id="weatherTemp">--°</span>
            <span class="weather-city" id="weatherCity">定位中...</span>
        </div>
    </div>

    <!-- 主容器 -->
    <main class="main-container" id="mainContainer">
        <!-- 时间日期模块 -->
        <div class="time-module hide-in-immersive" id="timeModule">
            <div class="time-display" id="timeDisplay">00:00</div>
            <div class="date-display" id="dateDisplay">加载中...</div>
        </div>

        <!-- 搜索模块 -->
        <div class="search-container hide-in-immersive" id="searchContainer">
            <div class="search-box">
                <div class="search-engine-selector" id="searchEngineSelector">
                    <img class="search-engine-icon" id="currentEngineIcon" src="" alt="">
                    <svg class="search-engine-arrow" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
                </div>
                <input type="text" class="search-input" id="searchInput" placeholder="输入关键词搜索..." autocomplete="off">
                <div class="search-actions">
                    <button class="search-btn clear-btn" id="clearBtn">
                        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                    </button>
                    <button class="search-btn" id="searchBtn">
                        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    </button>
                </div>
            </div>
            <!-- 搜索引擎下拉 -->
            <div class="search-engine-dropdown" id="searchEngineDropdown"></div>
            <!-- 搜索建议 -->
            <div class="search-suggestions" id="searchSuggestions"></div>
        </div>

        <!-- 快捷方式模块 -->
        <div class="shortcuts-container hide-in-immersive" id="shortcutsContainer">
            <div class="shortcuts-grid" id="shortcutsGrid"></div>
        </div>
    </main>

    <!-- 待办事项模块 -->
    <div class="todo-module hide-in-immersive" id="todoModule">
        <button class="todo-toggle" id="todoToggle">
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            <span class="todo-badge hidden" id="todoBadge">0</span>
        </button>
        <div class="todo-panel" id="todoPanel">
            <div class="todo-header">
                <span class="todo-title">待办事项</span>
                <div class="todo-actions">
                    <button class="todo-action-btn" id="clearCompletedBtn" title="清空已完成">
                        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    </button>
                </div>
            </div>
            <div class="todo-input-container">
                <input type="text" class="todo-input" id="todoInput" placeholder="添加待办事项，按回车确认...">
            </div>
            <div class="todo-list" id="todoList">
                <div class="todo-empty">暂无待办事项</div>
            </div>
        </div>
    </div>

    <!-- 设置按钮 -->
    <button class="settings-trigger hide-in-immersive" id="settingsTrigger" title="设置 (Ctrl+,)">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L3.16 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </button>

    <!-- 设置面板 -->
    <div class="settings-overlay" id="settingsOverlay"></div>
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <h2 class="settings-title">设置</h2>
            <button class="settings-close" id="settingsClose">
                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
        <div class="settings-tabs">
            <button class="settings-tab active" data-tab="general">通用</button>
            <button class="settings-tab" data-tab="search">搜索</button>
            <button class="settings-tab" data-tab="layout">布局</button>
            <button class="settings-tab" data-tab="wallpaper">壁纸</button>
            <button class="settings-tab" data-tab="shortcuts">快捷方式</button>
            <button class="settings-tab" data-tab="data">数据</button>
        </div>
        <div class="settings-content">
            <!-- 通用设置 -->
            <div class="settings-section active" id="tab-general">
                <div class="setting-item">
                    <label class="toggle-switch">
                        <span>
                            <span class="setting-label">深色模式</span>
                            <span class="setting-desc">切换深色/浅色主题</span>
                        </span>
                        <input type="checkbox" id="darkModeToggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <label class="toggle-switch">
                        <span>
                            <span class="setting-label">跟随系统主题</span>
                            <span class="setting-desc">自动跟随系统深色/浅色模式</span>
                        </span>
                        <input type="checkbox" id="followSystemTheme" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <label class="toggle-switch">
                        <span>
                            <span class="setting-label">显示秒数</span>
                            <span class="setting-desc">时间显示包含秒数</span>
                        </span>
                        <input type="checkbox" id="showSeconds">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <label class="toggle-switch">
                        <span>
                            <span class="setting-label">显示农历</span>
                            <span class="setting-desc">日期显示包含农历</span>
                        </span>
                        <input type="checkbox" id="showLunar">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <label class="toggle-switch">
                        <span>
                            <span class="setting-label">显示天气</span>
                            <span class="setting-desc">在页面右上角显示天气信息</span>
                        </span>
                        <input type="checkbox" id="showWeather" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <label class="toggle-switch">
                        <span>
                            <span class="setting-label">显示待办</span>
                            <span class="setting-desc">显示待办事项浮动按钮</span>
                        </span>
                        <input type="checkbox" id="showTodo" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <label class="toggle-switch">
                        <span>
                            <span class="setting-label">页面动画</span>
                            <span class="setting-desc">启用页面过渡动画效果</span>
                        </span>
                        <input type="checkbox" id="enableAnimations" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <!-- 搜索设置 -->
            <div class="settings-section" id="tab-search">
                <div class="setting-item">
                    <label class="toggle-switch">
                        <span>
                            <span class="setting-label">搜索建议</span>
                            <span class="setting-desc">输入时显示搜索建议</span>
                        </span>
                        <input type="checkbox" id="enableSuggestions" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <label class="setting-label">建议数量</label>
                    <span class="setting-desc">搜索建议显示条数</span>
                    <input type="range" class="setting-slider" id="suggestionCount" min="5" max="10" value="8">
                    <span class="slider-value" id="suggestionCountValue">8</span>
                </div>
                <div class="setting-item">
                    <label class="setting-label">搜索引擎管理</label>
                    <span class="setting-desc">点击下方引擎设置为默认</span>
                    <div id="searchEngineList" style="margin-top: var(--spacing-sm);"></div>
                </div>
            </div>

            <!-- 布局设置 -->
            <div class="settings-section" id="tab-layout">
                <div class="setting-item">
                    <label class="setting-label">搜索框位置</label>
                    <select class="setting-select" id="searchPosition">
                        <option value="center">居中</option>
                        <option value="top">顶部</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label class="setting-label">快捷方式每行数量</label>
                    <input type="range" class="setting-slider" id="shortcutsPerRow" min="4" max="10" value="8">
                    <span class="slider-value" id="shortcutsPerRowValue">8</span>
                </div>
                <div class="setting-item">
                    <label class="toggle-switch">
                        <span>
                            <span class="setting-label">显示快捷方式名称</span>
                            <span class="setting-desc">在图标下方显示网站名称</span>
                        </span>
                        <input type="checkbox" id="showShortcutNames" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <!-- 壁纸设置 -->
            <div class="settings-section" id="tab-wallpaper">
                <div class="setting-item">
                    <label class="setting-label">壁纸源</label>
                    <select class="setting-select" id="wallpaperSource">
                        <option value="bing">必应每日壁纸</option>
                        <option value="unsplash">Unsplash随机</option>
                        <option value="local">本地图片</option>
                        <option value="color">纯色背景</option>
                    </select>
                </div>
                <div class="setting-item" id="unsplashKeywordContainer" style="display: none;">
                    <label class="setting-label">Unsplash关键词</label>
                    <input type="text" class="setting-input" id="unsplashKeyword" placeholder="如: nature, minimal, anime" value="nature">
                </div>
                <div class="setting-item" id="localWallpaperContainer" style="display: none;">
                    <label class="setting-label">上传本地图片</label>
                    <input type="file" class="setting-input" id="localWallpaperInput" accept="image/*">
                </div>
                <div class="setting-item" id="colorWallpaperContainer" style="display: none;">
                    <label class="setting-label">背景颜色</label>
                    <div class="color-picker" id="colorPicker">
                        <div class="color-option active" style="background: #121212;" data-color="#121212"></div>
                        <div class="color-option" style="background: #1a1a2e;" data-color="#1a1a2e"></div>
                        <div class="color-option" style="background: #16213e;" data-color="#16213e"></div>
                        <div class="color-option" style="background: #0f3460;" data-color="#0f3460"></div>
                        <div class="color-option" style="background: #533483;" data-color="#533483"></div>
                        <div class="color-option" style="background: #e94560;" data-color="#e94560"></div>
                        <div class="color-option" style="background: #42b883;" data-color="#42b883"></div>
                        <div class="color-option" style="background: #f5f5f5;" data-color="#f5f5f5"></div>
                    </div>
                </div>
                <div class="setting-item">
                    <label class="setting-label">壁纸模糊度</label>
                    <input type="range" class="setting-slider" id="wallpaperBlur" min="0" max="50" value="0">
                    <span class="slider-value" id="wallpaperBlurValue">0px</span>
                </div>
                <div class="setting-item">
                    <label class="setting-label">遮罩层透明度</label>
                    <input type="range" class="setting-slider" id="wallpaperOverlay" min="0" max="100" value="0">
                    <span class="slider-value" id="wallpaperOverlayValue">0%</span>
                </div>
                <div class="setting-item">
                    <label class="setting-label">自动切换壁纸</label>
                    <select class="setting-select" id="wallpaperAutoChange">
                        <option value="never">从不</option>
                        <option value="startup">每次打开</option>
                        <option value="10min">每10分钟</option>
                        <option value="30min">每30分钟</option>
                        <option value="1hour">每小时</option>
                        <option value="daily">每天</option>
                    </select>
                </div>
            </div>

            <!-- 快捷方式设置 -->
            <div class="settings-section" id="tab-shortcuts">
                <div class="setting-item">
                    <label class="setting-label">预设快捷方式</label>
                    <span class="setting-desc">点击添加到快捷方式面板</span>
                    <div class="setting-btns" style="margin-top: var(--spacing-sm); flex-wrap: wrap;">
                        <button class="setting-btn" data-add-shortcut="微信" data-url="https://weixin.qq.com">微信</button>
                        <button class="setting-btn" data-add-shortcut="抖音" data-url="https://douyin.com">抖音</button>
                        <button class="setting-btn" data-add-shortcut="微博" data-url="https://weibo.com">微博</button>
                        <button class="setting-btn" data-add-shortcut="淘宝" data-url="https://taobao.com">淘宝</button>
                        <button class="setting-btn" data-add-shortcut="京东" data-url="https://jd.com">京东</button>
                        <button class="setting-btn" data-add-shortcut="B站" data-url="https://bilibili.com">B站</button>
                        <button class="setting-btn" data-add-shortcut="知乎" data-url="https://zhihu.com">知乎</button>
                        <button class="setting-btn" data-add-shortcut="网易云" data-url="https://music.163.com">网易云</button>
                    </div>
                </div>
            </div>

            <!-- 数据管理 -->
            <div class="settings-section" id="tab-data">
                <div class="setting-item">
                    <label class="setting-label">备份配置</label>
                    <span class="setting-desc">将所有设置导出为JSON文件</span>
                    <button class="setting-btn primary" id="exportBtn" style="margin-top: var(--spacing-sm);">导出配置</button>
                </div>
                <div class="setting-item">
                    <label class="setting-label">恢复配置</label>
                    <span class="setting-desc">从JSON文件导入配置</span>
                    <input type="file" class="setting-input" id="importInput" accept=".json" style="margin-top: var(--spacing-sm);">
                </div>
                <div class="setting-item">
                    <label class="setting-label">重置设置</label>
                    <span class="setting-desc">恢复所有设置为默认值</span>
                    <button class="setting-btn danger" id="resetBtn" style="margin-top: var(--spacing-sm);">重置设置</button>
                </div>
                <div class="setting-item">
                    <label class="setting-label">清空数据</label>
                    <span class="setting-desc">删除所有本地存储的数据</span>
                    <button class="setting-btn danger" id="clearAllBtn" style="margin-top: var(--spacing-sm);">清空所有数据</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 右键菜单 -->
    <div class="context-menu" id="contextMenu">
        <div class="context-item" id="ctxRefreshWallpaper">
            <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            <span>刷新壁纸</span>
        </div>
        <div class="context-item" id="ctxSettings">
            <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L3.16 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            <span>打开设置</span>
        </div>
        <div class="context-item" id="ctxAddShortcut">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            <span>添加快捷方式</span>
        </div>
        <div class="context-divider"></div>
        <div class="context-item" id="ctxDarkMode">
            <svg viewBox="0 0 24 24"><path d="M9 2c-1.05 0-2.05.16-3 .46 1.69 1.24 2.79 3.26 2.79 5.54 0 3.87-3.13 7-7 7-1.13 0-2.19-.27-3.14-.74C.48 18.1 5.38 22 11 22c6.08 0 11-4.92 11-11S17.08 0 11 0z"/></svg>
            <span>切换深色模式</span>
        </div>
        <div class="context-item" id="ctxImmersive">
            <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
            <span>沉浸模式</span>
        </div>
    </div>

    <!-- 添加快捷方式弹窗 -->
    <div class="modal-overlay shortcut-modal" id="shortcutModal">
        <div class="modal">
            <h3 class="modal-title">添加快捷方式</h3>
            <div class="shortcut-form">
                <div class="form-group">
                    <label class="form-label">网站名称</label>
                    <input type="text" class="form-input" id="shortcutNameInput" placeholder="如: 百度">
                </div>
                <div class="form-group">
                    <label class="form-label">网站地址</label>
                    <input type="text" class="form-input" id="shortcutUrlInput" placeholder="如: https://baidu.com">
                </div>
            </div>
            <div class="modal-btns" style="margin-top: var(--spacing-lg);">
                <button class="setting-btn" id="cancelShortcutBtn">取消</button>
                <button class="setting-btn primary" id="confirmShortcutBtn">添加</button>
            </div>
        </div>
    </div>

    <!-- 确认弹窗 -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <h3 class="modal-title" id="confirmTitle">确认</h3>
            <p class="modal-text" id="confirmText">确定要执行此操作吗？</p>
            <div class="modal-btns">
                <button class="setting-btn" id="cancelConfirmBtn">取消</button>
                <button class="setting-btn danger" id="confirmActionBtn">确定</button>
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
